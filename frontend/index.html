<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZUZ Universe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0A; color: white; font-family: system-ui, -apple-system, sans-serif; padding: 20px; }
        .card { background: #1A1A1A; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #333; }
        .gold { color: #D4AF37; }
        .btn { background: #D4AF37; color: black; border: none; padding: 14px 24px; border-radius: 40px; font-weight: bold; width: 100%; margin-top: 12px; cursor: pointer; font-size: 16px; }
        .btn-secondary { background: #333; color: white; }
        .balance { font-size: 48px; font-weight: bold; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .progress-bar { background: #333; height: 8px; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #D4AF37, #FFD700); height: 100%; width: 0%; }
        .badge { background: rgba(212,175,55,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        input { background: #222; border: 1px solid #333; padding: 14px; border-radius: 16px; color: white; width: 100%; margin: 8px 0; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
        .small-card { background: #1A1A1A; border-radius: 16px; padding: 12px; text-align: center; border: 1px solid #333; }
        .address { font-family: monospace; font-size: 12px; word-break: break-all; background: #222; padding: 8px; border-radius: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card" style="background: linear-gradient(135deg, #D4AF37, #FFD700); color: black; text-align: center; padding: 32px 20px;">
        <div style="font-size: 14px; opacity: 0.8;">⚡ TIME > MONEY ⚡</div>
        <h1 style="font-size: 28px; margin: 8px 0;">ZUZ UNIVERSE</h1>
        <div style="font-size: 12px; opacity: 0.8;">7 Sages • 7 Civilizations</div>
    </div>

    <div class="card">
        <div class="flex">
            <div>
                <div style="font-size: 12px; color: #888;">ТВОЙ РАНГ</div>
                <div style="font-size: 24px; font-weight: bold;" id="sageName">🌱 Novice</div>
            </div>
            <div class="badge" id="sageBonus">+0% бонус</div>
        </div>
    </div>

    <div class="card">
        <div style="font-size: 12px; color: #888;">БАЛАНС ZUZ</div>
        <div class="balance gold" id="balance">0</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="flex" style="margin-top: 8px;">
            <span style="font-size: 12px; color: #888;" id="currentRank">🌱 Novice</span>
            <span style="font-size: 12px; color: #888;" id="nextRank">→ 📜 Wisdom: 1000 ZUZ</span>
        </div>
    </div>

    <div class="card">
        <div style="font-size: 12px; color: #888;">КОШЕЛЁК</div>
        <div class="address" id="walletAddress">Не подключён</div>
        <button class="btn" id="connectBtn">🔌 ПОДКЛЮЧИТЬ КОШЕЛЁК</button>
    </div>

    <div class="card">
        <div style="font-size: 12px; color: #888;">КУПИТЬ ZUZ</div>
        <div style="font-size: 12px; margin: 8px 0;">1 ZUZ = 0.0001 ETH | Мин. 0.01 ETH</div>
        <input type="number" id="ethAmount" placeholder="Сумма в ETH (например 0.01)" step="0.01">
        <div style="font-size: 14px; color: #D4AF37;" id="receiveAmount">Вы получите: 0 ZUZ</div>
        <button class="btn" id="buyBtn" disabled>🔒 ПОДКЛЮЧИТЕ КОШЕЛЁК</button>
    </div>

    <div class="grid">
        <div class="small-card"><div style="color: #D4AF37;">📊 APY</div><div style="font-weight: bold;">25%</div></div>
        <div class="small-card"><div style="color: #D4AF37;">🏆 РЕФЕРАЛЫ</div><div style="font-weight: bold;">5%</div></div>
    </div>

    <div class="card" style="text-align: center;">
        <div style="font-size: 12px; color: #888;">ПАРТНЁРСКАЯ ССЫЛКА</div>
        <div class="address" id="refLink">Загрузка...</div>
        <button class="btn btn-secondary" id="copyBtn">📋 КОПИРОВАТЬ</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        let web3 = null;
        let account = null;
        let userId = null;
        let userBalance = 0;

        const BACKEND_URL = 'https://zuz-backend.onrender.com';
        const PRESALE_ADDRESS = '0x8CdeBa5Db0a4046D8BBC655244173750c7DFd553';

        // Получаем данные из Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            const initData = tg.initDataUnsafe;
            if (initData?.user) {
                userId = initData.user.id;
                console.log('User ID:', userId);
                loadUserData();
                loadReferralLink();
            }
        }

        async function loadUserData() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/user/${userId}`);
                const data = await res.json();
                if (data.balance_zuz) {
                    userBalance = data.balance_zuz;
                    document.getElementById('balance').innerText = userBalance.toLocaleString();
                    updateSage(userBalance);
                }
            } catch(e) { console.error(e); }
        }

        function loadReferralLink() {
            if (userId) {
                const link = `https://t.me/zuzuniverse_bot?start=ref_${userId}`;
                document.getElementById('refLink').innerText = link;
            }
        }

        document.getElementById('copyBtn').onclick = () => {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            alert('✅ Ссылка скопирована!');
        };

        document.getElementById('ethAmount').oninput = function() {
            const eth = parseFloat(this.value) || 0;
            const zuz = eth / 0.0001;
            document.getElementById('receiveAmount').innerHTML = `Вы получите: ${zuz.toLocaleString()} ZUZ`;
        };

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    web3 = new Web3(window.ethereum);
                    document.getElementById('walletAddress').innerHTML = account.slice(0, 6) + '...' + account.slice(-4);
                    document.getElementById('connectBtn').innerHTML = '✅ КОШЕЛЁК ПОДКЛЮЧЁН';
                    document.getElementById('connectBtn').style.background = '#00D18C';
                    document.getElementById('buyBtn').disabled = false;
                    document.getElementById('buyBtn').innerHTML = '🛒 КУПИТЬ ZUZ';
                    
                    // Сохраняем пользователя
                    await fetch(`${BACKEND_URL}/api/user`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, walletAddress: account, referrerId: null })
                    });
                } catch(e) { alert('Ошибка подключения: ' + e.message); }
            } else {
                alert('Установите MetaMask или Trust Wallet');
            }
        };

        document.getElementById('buyBtn').onclick = async () => {
            if (!account) { alert('Сначала подключите кошелёк'); return; }
            const eth = parseFloat(document.getElementById('ethAmount').value);
            if (isNaN(eth) || eth < 0.01) { alert('Минимум 0.01 ETH'); return; }
            
            const wei = Web3.utils.toWei(eth.toString(), 'ether');
            try {
                const tx = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: account,
                        to: PRESALE_ADDRESS,
                        value: wei
                    }]
                });
                
                // Отправляем на бэкенд
                await fetch(`${BACKEND_URL}/api/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, ethAmount: eth, txHash: tx })
                });
                
                const zuzAmount = eth / 0.0001;
                userBalance += zuzAmount;
                document.getElementById('balance').innerText = userBalance.toLocaleString();
                updateSage(userBalance);
                alert(`✅ Куплено ${zuzAmount.toLocaleString()} ZUZ!\nTx: ${tx.slice(0,10)}...`);
                document.getElementById('ethAmount').value = '';
                document.getElementById('receiveAmount').innerHTML = 'Вы получите: 0 ZUZ';
            } catch(e) { alert('Ошибка транзакции: ' + e.message); }
        };

        const SAGE_LEVELS = [
            { name: "🌱 Novice", threshold: 0, bonus: 0, next: 1000 },
            { name: "📜 Wisdom", threshold: 1000, bonus: 2, next: 5000 },
            { name: "🌾 Prosperity", threshold: 5000, bonus: 5, next: 10000 },
            { name: "🛡️ Protection", threshold: 10000, bonus: 10, next: 25000 },
            { name: "⚡ Innovation", threshold: 25000, bonus: 15, next: 50000 },
            { name: "☯️ Harmony", threshold: 50000, bonus: 20, next: 100000 },
            { name: "⚔️ Power", threshold: 100000, bonus: 25, next: 250000 },
            { name: "👑 Immortality", threshold: 250000, bonus: 30, next: Infinity }
        ];

        function updateSage(balance) {
            let current = SAGE_LEVELS[0];
            for (let i = SAGE_LEVELS.length - 1; i >= 0; i--) {
                if (balance >= SAGE_LEVELS[i].threshold) { current = SAGE_LEVELS[i]; break; }
            }
            document.getElementById('sageName').innerHTML = current.name;
            document.getElementById('sageBonus').innerHTML = `+${current.bonus}% бонус`;
            document.getElementById('currentRank').innerHTML = current.name;
            
            let next = SAGE_LEVELS.find(l => l.threshold > balance);
            if (next) {
                const percent = (balance / next.threshold) * 100;
                document.getElementById('progressFill').style.width = Math.min(percent, 100) + '%';
                document.getElementById('nextRank').innerHTML = `→ ${next.name}: ${next.threshold.toLocaleString()} ZUZ`;
            } else {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('nextRank').innerHTML = '👑 Бессмертие достигнуто!';
            }
        }

        updateSage(0);
    </script>
</body>
</html>
